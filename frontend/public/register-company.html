<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل شركة — مستشفى الشركات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0A1E3C, #1A3A6C);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo h1 { font-size: 28px; color: #0A1E3C; margin-bottom: 4px; }
        .logo p { color: #6B7280; font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        .row { display: flex; gap: 12px; }
        .row .form-group { flex: 1; }
        label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px 14px; border: 2px solid #E5E7EB; border-radius: 8px; font-size: 14px; text-align: right; transition: border-color 0.2s; }
        input:focus, select:focus { outline: none; border-color: #DC8C28; }
        .btn { width: 100%; padding: 14px; background: #0A1E3C; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 12px; }
        .btn:hover { opacity: 0.9; }
        .error { background: #FEF2F2; color: #DC2626; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
        .error.show { display: block; }
        .success { background: #F0FDF4; color: #16A34A; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
        .success.show { display: block; }
        .skip { text-align: center; margin-top: 16px; font-size: 13px; color: #6B7280; }
        .skip a { color: #DC8C28; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <h1>🏢 سجل شركتك</h1>
        <p>ابدأ رحلة تشخيص وتحسين شركتك</p>
    </div>

    <div class="error" id="error"></div>
    <div class="success" id="success"></div>

    <form onsubmit="handleSubmit(event)">
        <div class="form-group">
            <label>اسم الشركة (بالعربية)</label>
            <input type="text" id="name_ar" required placeholder="مثال: شركة النور للتجارة">
        </div>
        <div class="form-group">
            <label>اسم الشركة (بالإنجليزية — اختياري)</label>
            <input type="text" id="name_en" placeholder="Al-Noor Trading Co.">
        </div>
        <div class="row">
            <div class="form-group">
                <label>القطاع</label>
                <select id="sector" required>
                    <option value="">اختر القطاع</option>
                    <option value="retail">تجارة التجزئة</option>
                    <option value="hospitality">فنادق وضيافة</option>
                    <option value="hajj_umrah">حج وعمرة</option>
                    <option value="transport">نقل ومواصلات</option>
                    <option value="catering">إعاشة وتموين</option>
                    <option value="realestate">عقارات</option>
                    <option value="healthcare">رعاية صحية</option>
                    <option value="education">تعليم</option>
                    <option value="technology">تقنية</option>
                    <option value="construction">مقاولات وإنشاءات</option>
                    <option value="manufacturing">صناعة</option>
                    <option value="finance">خدمات مالية</option>
                    <option value="agriculture">زراعة</option>
                    <option value="energy">طاقة</option>
                    <option value="other">أخرى</option>
                </select>
            </div>
            <div class="form-group">
                <label>حجم الشركة</label>
                <select id="size" required>
                    <option value="">اختر الحجم</option>
                    <option value="micro">متناهية الصغر (١-٥)</option>
                    <option value="small">صغيرة (٦-٤٩)</option>
                    <option value="medium">متوسطة (٥٠-٢٤٩)</option>
                    <option value="large">كبيرة (٢٥٠+)</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label>المدينة</label>
                <input type="text" id="city" placeholder="مكة المكرمة">
            </div>
            <div class="form-group">
                <label>سنة التأسيس</label>
                <input type="number" id="founded_year" placeholder="٢٠٢٠" min="1900" max="2026">
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label>عدد الموظفين</label>
                <input type="number" id="employees_count" placeholder="١٠" min="1">
            </div>
            <div class="form-group">
                <label>السجل التجاري (اختياري)</label>
                <input type="text" id="commercial_reg" placeholder="٤٠٣xxxxxxxxx">
            </div>
        </div>
        <button type="submit" class="btn">تسجيل الشركة وبدء التشخيص</button>
    </form>
    <div class="skip">
        <a href="/dashboard">تخطي ← الذهاب للوحة التحكم</a>
    </div>
</div>

<script>
const API = 'https://companies-hospital-production.up.railway.app';

function showError(msg) {
    const e = document.getElementById('error');
    e.textContent = msg;
    e.classList.add('show');
    setTimeout(() => e.classList.remove('show'), 5000);
}

async function handleSubmit(e) {
    e.preventDefault();
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login';
        return;
    }
    
    const data = {
        name_ar: document.getElementById('name_ar').value,
        name_en: document.getElementById('name_en').value || null,
        sector: document.getElementById('sector').value,
        size: document.getElementById('size').value,
        city: document.getElementById('city').value || null,
        founded_year: document.getElementById('founded_year').value ? parseInt(document.getElementById('founded_year').value) : null,
        employees_count: document.getElementById('employees_count').value ? parseInt(document.getElementById('employees_count').value) : null,
        commercial_reg: document.getElementById('commercial_reg').value || null,
    };
    
    try {
        const res = await fetch(`${API}/api/v1/companies`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`,
            },
            body: JSON.stringify(data),
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.detail || 'فشل تسجيل الشركة');
        
        document.getElementById('success').textContent = '✅ تم تسجيل الشركة بنجاح! جاري التوجيه...';
        document.getElementById('success').classList.add('show');
        setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
    } catch(err) {
        showError(err.message);
    }
}
</script>
</body>
</html>
