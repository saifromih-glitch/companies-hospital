<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romih Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0f0f1a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
.header{background:rgba(167,139,250,0.08);padding:16px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(167,139,250,0.15)}
.header-emoji{font-size:28px}
.header h1{font-size:20px;font-weight:600}
.header p{font-size:12px;color:#94a3b8}
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg{padding:12px 16px;border-radius:16px;max-width:85%;line-height:1.6;font-size:14px;white-space:pre-wrap}
.msg.user{background:rgba(167,139,250,0.2);align-self:flex-end;border-bottom-right-radius:4px}
.msg.bot{background:rgba(255,255,255,0.06);align-self:flex-start;border-bottom-left-radius:4px}
.msg .meta{font-size:11px;color:#64748b;margin-bottom:4px}
.typing{display:flex;gap:4px;padding:12px 16px;background:rgba(255,255,255,0.06);border-radius:16px;align-self:flex-start}
.typing span{width:8px;height:8px;background:#94a3b8;border-radius:50%;animation:bounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.input-area{padding:16px 24px;display:flex;gap:10px;border-top:1px solid rgba(167,139,250,0.15)}
.input-area input{flex:1;padding:12px 16px;border-radius:24px;border:1px solid rgba(167,139,250,0.2);background:rgba(255,255,255,0.05);color:#e2e8f0;font-size:14px;outline:none;direction:rtl}
.input-area input:focus{border-color:#a78bfa}
.input-area button{background:linear-gradient(135deg,#7c3aed,#a78bfa);border:none;color:white;padding:12px 24px;border-radius:24px;cursor:pointer;font-size:14px;font-weight:600;min-width:80px}
.input-area button:hover{opacity:0.9}
.input-area button:disabled{opacity:0.5;cursor:default}
.status{font-size:11px;padding:8px 24px;color:#64748b;display:flex;gap:16px}
</style>
</head>
<body>
<div class="header">
  <div class="header-emoji">&#127800;</div>
  <div>
    <h1>Romih Agent</h1>
    <p>&#1608;&#1603;&#1610;&#1604;&#1603; &#1575;&#1604;&#1584;&#1603;&#1610;</p>
  </div>
</div>
<div class="chat" id="chat">
  <div class="msg bot">
    <div class="meta">&#127800; Romih</div>
    &#1571;&#1607;&#1604;&#1575;&#1611; &#1576;&#1603; &#1601;&#1610; Romih Agent. &#1603;&#1610;&#1601; &#1571;&#1602;&#1583;&#1585; &#1605;&#1587;&#1575;&#1593;&#1583;&#1578;&#1603;&#1567;
  </div>
</div>
<div class="status" id="status">
  <span>&#128736; 52 &#1571;&#1583;&#1575;&#1577;</span>
  <span>&#128302; &#1580;&#1575;&#1607;&#1586;</span>
</div>
<div class="input-area">
  <input type="text" id="input" placeholder="&#1575;&#1603;&#1578;&#1576; &#1585;&#1587;&#1575;&#1604;&#1578;&#1603;..." onkeypress="if(event.key==='Enter')send()" autofocus dir="rtl">
  <button id="sendBtn" onclick="send()">&#1573;&#1585;&#1587;&#1575;&#1604;</button>
</div>
<script>
async function send(){
  const input=document.getElementById('input');
  const msg=input.value.trim();
  if(!msg)return;

  // Add user msg
  addMsg('user',msg);
  input.value='';

  // Typing
  const tid=addTyping();
  const btn=document.getElementById('sendBtn');
  btn.disabled=true;

  try{
    const r=await fetch('/romih/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg,task_type:'chat'})
    });
    const d=await r.json();
    removeTyping(tid);
    addMsg('bot',d.response||'No response');
  }catch(e){
    removeTyping(tid);
    addMsg('bot','Error: '+e.message);
  }
  btn.disabled=false;
}

function addMsg(role,text){
  const div=document.createElement('div');
  div.className='msg '+role;
  const t=new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});
  div.innerHTML='<div class="meta">'+(role==='bot'?'&#127800; Romih':'&#128100; &#1571;&#1606;&#1578;')+' &middot; '+t+'</div>'+text.replace(/\n/g,'<br>');
  document.getElementById('chat').appendChild(div);
  document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight;
}

function addTyping(){
  const div=document.createElement('div');
  div.className='typing';
  div.id='typing-'+Date.now();
  div.innerHTML='<span></span><span></span><span></span>';
  document.getElementById('chat').appendChild(div);
  return div.id;
}

function removeTyping(id){
  const el=document.getElementById(id);
  if(el)el.remove();
}
</script>
</body>
</html>
